{% extends "base.html" %}
{% block title %}Nueva reservación | Hotel Casa Bella{% endblock %}
{% block content %}
<section class="card form-card">
  <h1>Registrar nueva reservación</h1>
  <form method="post" class="reservation-form">
    <label>Nombre completo
      <input type="text" name="guest_name" required />
    </label>
    <label>Correo electrónico
      <input type="email" name="email" required />
    </label>
    <label>Teléfono
      <input type="text" name="phone" required />
    </label>
    <label>Habitación
      <select name="room_id" required>
        {% for room in rooms %}
          <option value="{{ room.id }}">{{ room.name }} (Capacidad {{ room.capacity }}) - ${{ "%.2f"|format(room.price_per_night) }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Fecha de llegada
      <input type="date" name="check_in" required />
    </label>
    <label>Fecha de salida
      <input type="date" name="check_out" required />
    </label>
    <label>Número de huéspedes
      <input type="number" name="guests" min="1" required />
    </label>
    <label>Solicitudes especiales
      <textarea name="special_requests" rows="3" placeholder="Ej. cama extra, dieta especial..."></textarea>
    </label>
    <button type="submit" class="btn-primary">Confirmar reservación</button>
  </form>
</section>
{% endblock %}
