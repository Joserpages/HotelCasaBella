<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Hotel Casa Bella{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Hotel Casa Bella</div>
      <nav>
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('rooms') }}">Habitaciones</a>
        <a href="{{ url_for('list_reservations') }}">Reservaciones</a>
        <a class="btn-primary" href="{{ url_for('new_reservation') }}">Nueva reservación</a>
      </nav>
    </header>

    <main class="container">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <section class="alerts">
            {% for category, message in messages %}
              <article class="alert {{ category }}">{{ message }}</article>
            {% endfor %}
          </section>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
